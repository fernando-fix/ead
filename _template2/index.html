<!DOCTYPE html>

                <div class="btn-group">
                    <button type="button" class="btn btn-outline-info dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Menu
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <a class="dropdown-item" href="index.html">
                            <img class="mx-2" src="assets/img/svg/house.svg">
                            Página inicial

                        <a class="dropdown-item" href="index.html">
                            <img class="mx-2" src="assets/img/svg/person.svg">

                            <img class="mx-2" src="assets/img/svg/box-arrow-left.svg">
                            Sair
                        </a>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <section id="classes" class="mt-3">
        <div class="container-lg">
            <div id="video-area">
                <div class="d-flex justify-content-between text-white mb-1 mt-1 ps-1 row row-cols-sm-2">
                    <div class="d-flex align-items-center">
                        <img src="assets/img/svg/vscode.svg" alt="curso-logo" style="height: 40px;">
                        <div>
                            <h5 class="ms-2 ">Produtividade com VSCode</h5>
                            <div style="height: 5px; min-width: 200px;" class="progress ms-2" role="progressbar"

                                <div class="progress-bar bg-info" style="width: 50%;">
                                </div>
                            </div>
                            <span class="ms-2 text-info">50%</span>
                        </div>
                    </div>
                    <div class="d-flex align-items-center col-auto justify-content-end">
                        <p class="m-0 fs-6">Conhecendo a ferramenta VSCode da Microsoft</p>
                        <img class="ms-3" src="assets/img/svg/code-slash-color.svg" style="height: 30px;"

                <div id="video-frame">

                    </iframe>
                    <a href="index.html" class="smcap" title="Community Coders"

                </div>
            </div>
        </div>

                </li>
                <li class="nav-item" role="presentation">

                <li class="nav-item" role="presentation">

                </li>

                    </button>
                </li>

                    <button class="nav-link" id="pills-disabled-tab" data-bs-toggle="pill"

                </li> -->

                    aria-labelledby="pills-classes-tab" tabindex="0">
                    Conteúdo das aulas
                </div>
                <div class="tab-pane fade" id="pills-description" role="tabpanel"
                    aria-labelledby="pills-description-tab" tabindex="0">
                    Conteúdo da descrição
                </div>
                <div class="tab-pane fade" id="pills-resourses" role="tabpanel" aria-labelledby="pills-resourses-tab"
                    tabindex="0">
                    Conteúdo dos recursos
                </div>
                <div class="tab-pane fade" id="pills-notes" role="tabpanel" aria-labelledby="pills-notes-tab"
                    tabindex="0">

                </div>
                <div class="tab-pane fade" id="pills-disabled" role="tabpanel" aria-labelledby="pills-disabled-tab"
                    tabindex="0">


                </div>
